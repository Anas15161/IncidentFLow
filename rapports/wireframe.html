    function selectWorkflowCategory(id) {
      DB.selectedWorkflowId = id;
      renderApp();
    }

    function updateActiveWfName(name) {
      const activeWf = DB.workflows.find(w => w.id === DB.selectedWorkflowId);
      if (activeWf) {
        activeWf.name = name;
      }
    }

    function toggleActiveWfEnabled() {
      const activeWf = DB.workflows.find(w => w.id === DB.selectedWorkflowId);
      if (activeWf) {
        activeWf.active = !activeWf.active;
        renderApp();
      }
    }

    function updateWfStateLabel(stateId, label) {
      const activeWf = DB.workflows.find(w => w.id === DB.selectedWorkflowId);
      if (activeWf) {
        const state = activeWf.states.find(s => s.id === stateId);
        if (state) state.label = label;
      }
    }

    function updateWfStateColor(stateId, color) {
      const activeWf = DB.workflows.find(w => w.id === DB.selectedWorkflowId);
      if (activeWf) {
        const state = activeWf.states.find(s => s.id === stateId);
        if (state) {
          state.color = color;
          renderApp();
        }
      }
    }

    function toggleWfStateActive(stateId) {
      const activeWf = DB.workflows.find(w => w.id === DB.selectedWorkflowId);
      if (activeWf) {
        const state = activeWf.states.find(s => s.id === stateId);
        if (state) {
          state.active = !state.active;
          renderApp();
        }
      }
    }

    function deleteWfStateClick(stateId) {
      const activeWf = DB.workflows.find(w => w.id === DB.selectedWorkflowId);
      if (!activeWf) return;

      const hasTransitions = activeWf.transitions.some(t => t.fromStateId === stateId || t.toStateId === stateId);
      if (hasTransitions) {
        if (!confirm("Cet état est utilisé dans des transitions actives. Supprimer l'état supprimera également les transitions associées. Voulez-vous continuer ?")) {
          return;
        }
      }

      activeWf.states = activeWf.states.filter(s => s.id !== stateId);
      activeWf.transitions = activeWf.transitions.filter(t => t.fromStateId !== stateId && t.toStateId !== stateId);
      renderApp();
    }

    function handleWfAddStateSubmit(e) {
      e.preventDefault();
      const id = document.getElementById("new-state-id").value.trim().replace(/\s+/g, "");
      const label = document.getElementById("new-state-label").value.trim();
      const color = document.getElementById("new-state-color").value;

      const activeWf = DB.workflows.find(w => w.id === DB.selectedWorkflowId);
      if (activeWf) {
        if (activeWf.states.some(s => s.id.toLowerCase() === id.toLowerCase())) {
          alert("Cet identifiant d'état existe déjà.");
          return;
        }
        activeWf.states.push({ id, label, color, active: true });
        renderApp();
      }
    }

    function deleteWfTransitionClick(transId) {
      const activeWf = DB.workflows.find(w => w.id === DB.selectedWorkflowId);
      if (activeWf) {
        activeWf.transitions = activeWf.transitions.filter(t => t.id !== transId);
        renderApp();
      }
    }

    function handleWfAddTransitionSubmit(e) {
      e.preventDefault();
      const fromStateId = document.getElementById("new-trans-from").value;
      const toStateId = document.getElementById("new-trans-to").value;
      const roleRequired = document.getElementById("new-trans-role").value;
      const requiresComment = document.getElementById("new-trans-requires-comment").checked;

      if (fromStateId === toStateId) {
        alert("L'état de départ et de destination doivent être différents.");
        return;
      }

      const activeWf = DB.workflows.find(w => w.id === DB.selectedWorkflowId);
      if (activeWf) {
        if (activeWf.transitions.some(t => t.fromStateId === fromStateId && t.toStateId === toStateId)) {
          alert("Cette transition existe déjà.");
          return;
        }

        activeWf.transitions.push({
          id: `t-${Date.now()}`,
          fromStateId,
          toStateId,
          roleRequired: roleRequired || undefined,
          requiresComment
        });
        renderApp();
      }
    }

    function saveWorkflowGlobally() {
      addNotification("Success", `Le workflow général a été mis à jour et appliqué.`);
      alert("Le workflow général a été mis à jour et appliqué.");
      renderApp();
    }

    /* ==========================================================================
       8. NOTIFICATIONS CENTER VIEW PANEL
       ========================================================================== */
    function renderNotificationsCenterPanel() {
      const unreadCount = DB.notifications.filter(n => !n.read).length;

      return `
        <div class="animate-fade-in" style="max-width: 800px; margin: 0 auto;">
          
          <div class="page-header">
            <div>
              <h1 class="page-title">Centre de Notifications</h1>
              <p class="page-subtitle">Timeline d'activités d'audit de sécurité et du cycle de vie des incidents.</p>
            </div>

            ${unreadCount > 0 ? `
              <button onclick="markAllNotificationsRead()" class="btn btn-secondary btn-small" style="font-weight: 700;">
                Tout marquer comme lu
              </button>
            ` : ''}
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px;">
            ${DB.notifications.length === 0 ? `
              <div class="card" style="text-align: center; padding: 48px; color: var(--text-muted); font-weight: 500;">
                Aucune notification ou log d'activité.
              </div>
            ` : DB.notifications.map(n => `
              <div class="notif-row ${!n.read ? 'unread' : ''}">
                <div class="notif-msg-block">
                  <div class="notif-icon-circle ${n.type.toLowerCase()}">
                    ${n.type === 'Danger' ? '🔴' : n.type === 'Warning' ? '🟡' : n.type === 'Success' ? '🟢' : '🔵'}
                  </div>

                  <div class="notif-body">
                    <p class="notif-text ${!n.read ? 'unread-bold' : ''}">${n.message}</p>
                    <div class="notif-meta-line">
                      <span>${n.timestamp}</span>
                      ${n.incidentId ? `
                        <span>•</span>
                        <button onclick="navigateToIncidentFromNotification('${n.incidentId}')" class="notif-link-btn">Consulter la fiche ${n.incidentId}</button>
                      ` : ''}
                    </div>
                  </div>
                </div>

                <button onclick="deleteNotification('${n.id}')" style="background: transparent; border: none; color: var(--text-muted); hover: color: #ef4444; cursor: pointer; padding: 4px;">
                  ${icon("trash")}
                </button>
              </div>
            `).join('')}
          </div>

          <div style="background-color: #f1f5f9; border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; font-size: 11px; color: var(--text-muted); line-height: 1.5;">
            Les notifications d'événements de criticité <strong>Critique</strong> ou relatives aux rôles et permissions d'administration sont journalisées de manière centralisée à des fins de conformité réglementaire ISO/IEC 27001.
          </div>

        </div>
      `;
    }

    function navigateToIncidentFromNotification(id) {
      const match = DB.incidents.find(i => i.id === id);
      if (match) {
        DB.activeTab = "incidents";
        DB.selectedIncidentId = id;
        DB.isCreatingIncident = false;
        renderApp();
      }
    }

    /* ==========================================================================
       DATE FORMATTING AND STATICS HELPERS
       ========================================================================== */
    function formatDateString(str) {
      try {
        const d = new Date(str);
        return d.toLocaleDateString("fr-FR", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch {
        return str;
      }
    }

    function getWorkflowState(category, stateId) {
      const wf = DB.workflows.find(w => w.category === category);
      if (wf) {
        return wf.states.find(s => s.id === stateId);
      }
      return null;
    }

    // Auto-initialize view rendering on load
    window.onload = function () {
      renderApp();
    };
  </script>
</body>

</html>
