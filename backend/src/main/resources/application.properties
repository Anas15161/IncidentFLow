spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/IncidentFlow_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:IncidentFlow_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:incidentflow_secure_db_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Profil actif par défaut
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev-mock}
